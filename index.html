<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revolution is Music to My Ears</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    #panels {
      display: none;
      width: 100%;
      height: 100vh;
    }

    .panel {
      display: inline-block;
      width: 50%;
      height: 100%;
      vertical-align: top;
    }

    .panel iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div id="panels">
  <div class="panel" id="panel-left">
    <iframe id="iframe-left" src="" frameborder="0" scrolling="no"></iframe>
  </div>
  <div class="panel" id="panel-right">
    <iframe id="iframe-right" src="" frameborder="0" scrolling="no"></iframe>
  </div>
</div>

<audio id="audio-player" preload="auto"></audio>

<script>
(function () {
  'use strict';

  var config = null;
  var audioCtx = null;
  var analyser = null;
  var dataArray = null;
  var source = null;
  var audioEl = document.getElementById('audio-player');
  var panels = document.getElementById('panels');
  var iframeLeft = document.getElementById('iframe-left');
  var iframeRight = document.getElementById('iframe-right');

  var isStarted = false;
  var isPlaying = false;
  var leftTurn = true;
  var lastBeatTime = 0;
  var beatCooldown = 150;
  var trackIndex = 0;

  var lastLeftId = null;
  var lastRightId = null;

  // Load config.json
  fetch('config.json')
    .then(function (res) {
      if (!res.ok) throw new Error('Failed to load config.json: ' + res.status);
      return res.json();
    })
    .then(function (data) {
      config = data;
    })
    .catch(function (err) {
      console.error('Could not load config.json:', err);
    });

  // Spacebar handler
  document.addEventListener('keydown', function (e) {
    if (e.code !== 'Space') return;
    e.preventDefault();

    if (!config) {
      console.error('Config not loaded yet.');
      return;
    }

    if (!isStarted) {
      startVisualizer();
    } else if (isPlaying) {
      pauseVisualizer();
    } else {
      resumeVisualizer();
    }
  });

  function getRandomImageId(exclude) {
    var images = config.images;
    if (images.length === 1) return images[0];
    var id;
    do {
      id = images[Math.floor(Math.random() * images.length)];
    } while (id === exclude);
    return id;
  }

  function setIframeSrc(iframeEl, imageId) {
    iframeEl.src = 'https://embed.gettyimages.com/embed/' + imageId;
  }

  function showInitialImages() {
    var leftId = getRandomImageId(null);
    var rightId = getRandomImageId(leftId);
    lastLeftId = leftId;
    lastRightId = rightId;
    setIframeSrc(iframeLeft, leftId);
    setIframeSrc(iframeRight, rightId);
    panels.style.display = 'block';
  }

  function swapOnBeat() {
    var newId;
    if (leftTurn) {
      newId = getRandomImageId(lastLeftId);
      lastLeftId = newId;
      setIframeSrc(iframeLeft, newId);
    } else {
      newId = getRandomImageId(lastRightId);
      lastRightId = newId;
      setIframeSrc(iframeRight, newId);
    }
    leftTurn = !leftTurn;
  }

  function startVisualizer() {
    isStarted = true;

    // Create AudioContext inside user gesture
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    // Set up playlist
    audioEl.addEventListener('ended', nextTrack);
    loadTrack(0);

    showInitialImages();
    isPlaying = true;
    beatLoop();
  }

  function loadTrack(index) {
    trackIndex = index;
    var filename = config.playlist[trackIndex];
    audioEl.src = 'audio/' + encodeURIComponent(filename);
    audioEl.play().catch(function (err) {
      console.error('Audio play error:', err);
    });
  }

  function nextTrack() {
    var next = (trackIndex + 1) % config.playlist.length;
    loadTrack(next);
  }

  function pauseVisualizer() {
    isPlaying = false;
    audioEl.pause();
  }

  function resumeVisualizer() {
    isPlaying = true;
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    audioEl.play().catch(function (err) {
      console.error('Audio resume error:', err);
    });
    beatLoop();
  }

  function beatLoop() {
    if (!isPlaying) return;
    requestAnimationFrame(beatLoop);

    analyser.getByteFrequencyData(dataArray);

    var sum = 0;
    for (var i = 0; i < dataArray.length; i++) {
      sum += dataArray[i];
    }
    var avg = sum / dataArray.length;

    var now = performance.now();
    var sensitivity = (config.settings && config.settings.beatSensitivity != null)
      ? config.settings.beatSensitivity
      : 0.65;

    if (avg > sensitivity * 255 && (now - lastBeatTime) > beatCooldown) {
      lastBeatTime = now;
      swapOnBeat();
    }
  }
})();
</script>

</body>
</html>

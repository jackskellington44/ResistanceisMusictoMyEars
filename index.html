<div id="audio-controls">
    <label for="file-input" class="file-label">Choose Music</label>
    <input type="file" id="file-input" accept="audio/*">
    <button id="play-btn">Play</button>
    <div id="beat-indicator"></div>
</div>

<script>
    class MusicVisualizer {
        constructor() {
            this.container = document.getElementById('visualizer-container');
            this.audioContext = null;
            this.analyser = null;
            this.dataArray = null;
            this.source = null;
            this.audio = null;
            this.isPlaying = false;
            this.images = [];
            this.settings = {
                beatSensitivity: 0.7,
                maxConcurrent: 15,
                flashDuration: 2.5
            };
            
            this.initializeAudio();
            this.loadConfig();
            this.setupEventListeners();
        }
        
        async initializeAudio() {
            try {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.analyser = this.audioContext.createAnalyser();
                this.analyser.fftSize = 256;
                const bufferLength = this.analyser.frequencyBinCount;
                this.dataArray = new Uint8Array(bufferLength);
            } catch (error) {
                console.error('Audio initialization failed:', error);
            }
        }
        
        async loadConfig() {
            try {
                // Try to load config from GitHub repo
                const configUrl = 'https://raw.githubusercontent.com/yourusername/your-repo/main/config.json';
                const response = await fetch(configUrl);
                
                if (response.ok) {
                    const config = await response.json();
                    this.images = config.images || [];
                    this.settings = { ...this.settings, ...config.settings };
                    console.log('Loaded config with', this.images.length, 'images');
                } else {
                    // Fallback to default config
                    this.loadDefaultConfig();
                }
            } catch (error) {
                console.log('Could not load remote config, using default:', error);
                this.loadDefaultConfig();
            } finally {
                // Hide loading message
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        loadDefaultConfig() {
            // Default configuration with placeholder images
            this.images = [
                {
                    id: 'placeholder1',
                    embedUrl: 'https://embed.gettyimages.com/embed/placeholder1',
                    html: '<div style="width: 150px; height: 150px; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); border-radius: 10px;"></div>',
                    flashDuration: 2.5
                },
                {
                    id: 'placeholder2',
                    embedUrl: 'https://embed.gettyimages.com/embed/placeholder2',
                    html: '<div style="width: 120px; height: 120px; background: linear-gradient(45deg, #a8e6cf, #ffd93d); border-radius: 15px;"></div>',
                    flashDuration: 1.8
                }
            ];
            console.log('Loaded default config with', this.images.length, 'images');
        }
        
        setupEventListeners() {
            const fileInput = document.getElementById('file-input');
            const playBtn = document.getElementById('play-btn');
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    this.loadAudioFile(file);
                }
            });
            
            playBtn.addEventListener('click', () => {
                if (this.isPlaying) {
                    this.pauseAudio();
                } else {
                    this.playAudio();
                }
            });
        }
        
        loadAudioFile(file) {
            if (this.audio) {
                this.audio.pause();
                this.audio = null;
            }
            
            this.audio = new Audio();
            this.audio.src = URL.createObjectURL(file);
            
            if (this.audioContext && this.source) {
                this.source.disconnect();
            }
            
            this.source = this.audioContext.createMediaElementSource(this.audio);
            this.source.connect(this.analyser);
            this.analyser.connect(this.audioContext.destination);
        }
        
        playAudio() {
            if (!this.audio) {
                alert('Please select an audio file first');
                return;
            }
            
            if (this.audioContext.state === 'suspended') {
                this.audioContext.resume();
            }
            
            this.audio.play();
            this.isPlaying = true;
            document.getElementById('play-btn').textContent = 'Pause';
            
            this.startVisualization();
        }
        
        pauseAudio() {
            if (!this.audio) return;
            
            this.audio.pause();
            this.isPlaying = false;
            document.getElementById('play-btn').textContent = 'Play';
        }
        
        startVisualization() {
            const animate = () => {
                if (!this.isPlaying) return;
                
                requestAnimationFrame(animate);
                
                this.analyser.getByteFrequencyData(this.dataArray);
                
                // Calculate average frequency
                const average = this.dataArray.reduce((a, b) => a + b) / this.dataArray.length;
                
                // Update beat indicator
                const beatIndicator = document.getElementById('beat-indicator');
                if (average > this.settings.beatSensitivity * 255) {
                    beatIndicator.classList.add('active');
                    this.triggerFlash();
                } else {
                    beatIndicator.classList.remove('active');
                }
            };
            
            animate();
        }
        
        triggerFlash() {
            if (this.container.children.length >= this.settings.maxConcurrent) {
                // Remove oldest flash
                this.container.removeChild(this.container.firstChild);
            }
            
            const randomImage = this.images[Math.floor(Math.random() * this.images.length)];
            const flashElement = document.createElement('div');
            flashElement.className = 'flash-image';
            flashElement.innerHTML = randomImage.html;
            flashElement.style.left = Math.random() * (window.innerWidth - 200) + 'px';
            flashElement.style.top = Math.random() * (window.innerHeight - 200) + 'px';
            flashElement.style.setProperty('--duration', randomImage.flashDuration + 's');
            
            this.container.appendChild(flashElement);
            
            // Remove after animation completes
            setTimeout(() => {
                if (flashElement.parentNode) {
                    flashElement.parentNode.removeChild(flashElement);
                }
            }, randomImage.flashDuration * 1000);
        }
    }
    
    // Initialize visualizer when page loads
    window.addEventListener('load', () => {
        new MusicVisualizer();
    });
    
    // Handle window resize
    window.addEventListener('resize', () => {
        // Adjust any responsive elements if needed
    });
</script>
